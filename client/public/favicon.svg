<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39FF14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D1FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Shield Background -->
  <path d="M100 10 L170 35 C170 110 100 180 100 180 C100 180 30 110 30 35 L100 10 Z" fill="#0A1F44" stroke="url(#grad)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- Stylized Football -->
  <circle cx="100" cy="90" r="35" stroke="#39FF14" stroke-width="4" fill="none" />
  <path d="M75 75 L125 105 M125 75 L75 105 M100 55 L100 125 M65 90 L135 90" stroke="#39FF14" stroke-width="2" opacity="0.6" />
  
  <!-- Academy Initials -->
  <text x="100" y="155" text-anchor="middle" fill="#39FF14" font-family="Arial, sans-serif" font-weight="900" font-size="28">KKFA</text>
</svg>